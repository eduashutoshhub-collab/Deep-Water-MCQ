        options:["Poverty","Tradition","Both","None"],
        ans:"Both"
    });
}

const quiz = document.getElementById("quiz");

questions.forEach((q,index)=>{
    const card = document.createElement("div");
    card.classList.add("card");

    const title = document.createElement("h3");
    title.innerText = `${index+1}. ${q.q}`;
    card.appendChild(title);

    q.options.forEach(opt=>{
        const btn = document.createElement("div");
        btn.classList.add("option");
        btn.innerText = opt;

        btn.onclick = ()=>{
            const all = btn.parentElement.querySelectorAll(".option");
            all.forEach(o=>o.style.pointerEvents="none");

            if(opt===q.ans){
                btn.classList.add("correct");
            } else {
                btn.classList.add("wrong");
                all.forEach(o=>{
                    if(o.innerText===q.ans){
                        o.classList.add("correct");
                    }
                });
            }
        };

        card.appendChild(btn);
    });

    quiz.appendChild(card);
});

function downloadPDF(){
    let content = "<h2>Answer Sheet</h2><table border='1'><tr><th>Question</th><th>Answer</th></tr>";

    questions.forEach((q,i)=>{
        content += `<tr><td>${i+1}. ${q.q}</td><td>${q.ans}</td></tr>`;
    });

    content += "</table>";

    let win = window.open('', '', 'width=800,height=700');
    win.document.write(content);
    win.document.close();
    win.print();
}
